# Temporal.io Workflow Orchestrator
# Run via Docker: docker run --name temporal -p 7233:7233:7233 -p 8233:8233:8233 temporalio/auto-setup:latest
# Backend Connects: gRPC at localhost:7233
# Workflow: http://localhost:8233
version: "3.9"

services:
  postgresql:
    image: postgres:12-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"   # gRPC + REST
      - "8233:8233"   # Web UI
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - TEMPORAL_DATA_DIR=/home/temporal/temporal/data
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    volumes:
      - tf-data:/home/temporal/temporal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8233/health"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  tf-data:
  pg-data:
