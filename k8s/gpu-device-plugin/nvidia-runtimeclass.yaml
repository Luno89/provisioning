# k3s auto-detects nvidia-container-runtime on the host and registers it as an AVAILABLE
# (not default) containerd runtime by itself — confirmed via "Found nvidia container runtime
# at /usr/bin/nvidia-container-runtime" in its startup log, with zero config from us. Trying to
# force it to be the node-wide DEFAULT runtime by hand-editing the generated containerd config
# (config.toml.tmpl) turned out fragile in two different ways (a silently-dropped duplicate
# `imports` key, then a hard containerd crash from redeclaring the same TOML table k3s already
# declares) — not worth fighting. This RuntimeClass just points pods at the runtime k3s already
# registered; only pods that explicitly set `runtimeClassName: nvidia` use it, everything else
# keeps using the default runc runtime untouched.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
handler: nvidia
